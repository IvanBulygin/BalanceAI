<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 68" fill="none">
  <defs>
    <!-- Brand gradient: magenta → purple → cyan (top to bottom) -->
    <linearGradient id="brand-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <!-- AI superscript gradient: cyan → blue -->
    <linearGradient id="ai-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Mask: hollow out the inner upward triangle -->
    <mask id="scale-mask">
      <rect width="100%" height="100%" fill="white"/>
      <polygon points="24,22 14,48 34,48" fill="black"/>
    </mask>
  </defs>

  <!-- BAL -->
  <text
    x="0" y="52"
    font-family="'Inter','Helvetica Neue','Arial',sans-serif"
    font-weight="800"
    font-size="52"
    fill="#1A1A2E"
    letter-spacing="12"
  >BAL</text>

  <!-- Scale / balance symbol (replaces the A) -->
  <g transform="translate(157,2)" aria-label="A as balance scale">
    <g mask="url(#scale-mask)">
      <!-- Horizontal bar across the top -->
      <rect x="-3" y="0" width="54" height="7" rx="1" fill="url(#brand-grad)"/>
      <!-- Upward triangle body (apex at top, base at bottom) -->
      <polygon points="24,4 3,58 45,58" fill="url(#brand-grad)"/>
    </g>
  </g>

  <!-- NCE -->
  <text
    x="218" y="52"
    font-family="'Inter','Helvetica Neue','Arial',sans-serif"
    font-weight="800"
    font-size="52"
    fill="#1A1A2E"
    letter-spacing="12"
  >NCE</text>

  <!-- AI superscript -->
  <text
    x="408" y="20"
    font-family="'Inter','Helvetica Neue','Arial',sans-serif"
    font-weight="700"
    font-size="20"
    fill="url(#ai-grad)"
    letter-spacing="2"
  >AI</text>
</svg>
