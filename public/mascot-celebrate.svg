<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 460" fill="none">
  <defs>
    <linearGradient id="bc-body" x1="140" y1="120" x2="140" y2="455" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3FA0F5"/>
      <stop offset="0.6" stop-color="#9B6BFF"/>
      <stop offset="1" stop-color="#E918DA"/>
    </linearGradient>
    <linearGradient id="bc-head" x1="140" y1="10" x2="140" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E918DA"/>
      <stop offset="0.5" stop-color="#9B6BFF"/>
      <stop offset="1" stop-color="#3FA0F5"/>
    </linearGradient>
    <radialGradient id="bc-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#C77AFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#C77AFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Head glow -->
  <ellipse cx="140" cy="75" rx="70" ry="75" fill="url(#bc-glow)"/>

  <!-- Raised Left Arm -->
  <path d="M90 165 Q40 130 25 65 Q20 45 40 45 Q60 50 65 80 Q85 120 115 150 Z"
        fill="url(#bc-body)" stroke="#000" stroke-width="2"/>

  <!-- Raised Right Arm -->
  <path d="M190 165 Q240 130 255 65 Q260 45 240 45 Q220 50 215 80 Q195 120 165 150 Z"
        fill="url(#bc-body)" stroke="#000" stroke-width="2"/>

  <!-- Body: standing torso + legs -->
  <path d="M75 170 Q75 145 140 145 Q205 145 205 170 L205 280 Q205 300 180 305 L180 430 Q180 450 160 450 Q145 450 143 430 L143 320 L137 320 L137 430 Q135 450 120 450 Q100 450 100 430 L100 305 Q75 300 75 280 Z"
        fill="url(#bc-body)" stroke="#000" stroke-width="2"/>

  <!-- Head: flame -->
  <path d="M140 10 Q170 22 166 55 Q190 70 178 105 Q166 135 140 148 Q114 135 102 105 Q90 70 114 55 Q110 22 140 10 Z"
        fill="url(#bc-head)" stroke="#000" stroke-width="2"/>

  <!-- Black visor mask -->
  <rect x="104" y="70" width="72" height="26" rx="13" fill="#000"/>

  <!-- Plus-plus eyes -->
  <g stroke="#fff" stroke-width="3" stroke-linecap="round">
    <line x1="123" y1="78" x2="123" y2="88"/>
    <line x1="118" y1="83" x2="128" y2="83"/>
    <line x1="157" y1="78" x2="157" y2="88"/>
    <line x1="152" y1="83" x2="162" y2="83"/>
  </g>

  <!-- Big smile -->
  <path d="M120 108 Q140 128 160 108" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
