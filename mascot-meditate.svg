<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 340" fill="none">
  <defs>
    <linearGradient id="bm-body" x1="160" y1="150" x2="160" y2="335" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3FA0F5"/>
      <stop offset="0.55" stop-color="#9B6BFF"/>
      <stop offset="1" stop-color="#E918DA"/>
    </linearGradient>
    <linearGradient id="bm-head" x1="160" y1="10" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E918DA"/>
      <stop offset="0.5" stop-color="#9B6BFF"/>
      <stop offset="1" stop-color="#3FA0F5"/>
    </linearGradient>
    <radialGradient id="bm-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#C77AFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#C77AFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Head halo glow -->
  <ellipse cx="160" cy="80" rx="70" ry="75" fill="url(#bm-glow)"/>

  <!-- Body: lotus dome -->
  <path d="M40 310 Q40 175 160 168 Q280 175 280 310 Q280 325 265 325 L55 325 Q40 325 40 310 Z"
        fill="url(#bm-body)" stroke="#000" stroke-width="2"/>

  <!-- Crossed legs (left and right curves at the base) -->
  <path d="M50 305 Q85 270 135 295 Q110 310 80 310 Z" fill="url(#bm-body)" stroke="#000" stroke-width="2"/>
  <path d="M270 305 Q235 270 185 295 Q210 310 240 310 Z" fill="url(#bm-body)" stroke="#000" stroke-width="2"/>

  <!-- Folded hands slit -->
  <path d="M140 290 Q160 282 180 290" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Head: flame / teardrop -->
  <path d="M160 10 Q190 22 186 55 Q210 70 198 105 Q186 135 160 148 Q134 135 122 105 Q110 70 134 55 Q130 22 160 10 Z"
        fill="url(#bm-head)" stroke="#000" stroke-width="2"/>

  <!-- Black visor mask -->
  <rect x="124" y="70" width="72" height="26" rx="13" fill="#000"/>

  <!-- Closed eyes -->
  <path d="M137 83 Q144 76 151 83" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M169 83 Q176 76 183 83" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Peaceful smile -->
  <path d="M142 112 Q160 124 178 112" stroke="#000" stroke-width="2.8" fill="none" stroke-linecap="round"/>
</svg>
